stages:
  - plan
  - deploy

gcp-plan:
  stage: plan
  image: node:20
  before_script:
    - npm ci --omit=dev
  script:
    - node src/agent/cli.js "$CI_PROJECT_ID"
  variables:
    # Required because gitlabClient uses Authorization: Bearer <token>
    GITLAB_TOKEN: $GITLAB_TOKEN
    GITLAB_PROJECT_ID: $CI_PROJECT_ID
  artifacts:
    paths:
      - gcp-plan.json
    expire_in: 1 day

deploy-from-plan:
  stage: deploy
  image:
    name: google/cloud-sdk:alpine
    entrypoint: [""]
  needs:
    - job: gcp-plan
      artifacts: true
  before_script:
    - apk add --no-cache python3
    # Masked GitLab variable: base64-encoded full service account JSON
    - echo "$GCP_SERVICE_ACCOUNT_KEY" | base64 -d > key.json
    - gcloud auth activate-service-account --key-file=key.json
    - gcloud config set project "$GCP_PROJECT_ID"
  script:
    - python3 deploy_from_plan.py --plan gcp-plan.json --project "$GCP_PROJECT_ID"
  only:
    - main
    - master