stages:
  - plan
  - deploy

variables:
  # Artifact Registry Docker repo (created by registry-prep if missing). Must match ci-write-deploy-image.js default.
  GAR_REPOSITORY: flowforge-ci
  GCP_REGION: us-central1

gcp-plan:
  stage: plan
  image: node:20
  before_script:
    - npm ci --omit=dev
  script:
    - node src/agent/cli.js $CI_PROJECT_ID --write-files
    - test -n "$GCP_PROJECT_ID" || (echo "GCP_PROJECT_ID must be set in CI/CD variables" && exit 1)
    - node scripts/ci-write-deploy-image.js
  variables:
    # Project CI/CD variables (e.g. GITLAB_TOKEN) are injected automatically — do not set
    # GITLAB_TOKEN to the text "$GITLAB_TOKEN" in the UI; paste the real glpat-... secret.
    GITLAB_PROJECT_ID: $CI_PROJECT_ID
  artifacts:
    paths:
      - gcp-plan.json
      - deploy-image.txt
    expire_in: 1 day

# Ensure Artifact Registry Docker repo exists (Kaniko push needs a repo or createOnPush IAM).
registry-prep:
  stage: deploy
  image: google/cloud-sdk:alpine
  needs:
    - gcp-plan
  script:
    - echo "$GCP_SERVICE_ACCOUNT_KEY" | base64 -d > key.json
    - gcloud auth activate-service-account --key-file=key.json
    - gcloud config set project "$GCP_PROJECT_ID"
    - gcloud artifacts repositories describe "$GAR_REPOSITORY" --location="$GCP_REGION" --format="value(name)" 2>/dev/null || gcloud artifacts repositories create "$GAR_REPOSITORY" --repository-format=docker --location="$GCP_REGION" --description="GitLab CI Docker images"
  only:
    - main
    - master

# Build & push with Kaniko — does NOT use gcloud builds submit / Cloud Build staging bucket.
build-container:
  stage: deploy
  image:
    name: gcr.io/kaniko-project/executor:v1.23.2-debug
    entrypoint: [""]
  needs:
    - job: gcp-plan
      artifacts: true
    - job: registry-prep
  script:
    - echo "$GCP_SERVICE_ACCOUNT_KEY" | base64 -d > key.json
    - export GOOGLE_APPLICATION_CREDENTIALS=$CI_PROJECT_DIR/key.json
    - export DEST=$(cat deploy-image.txt)
    # Pushes must target Artifact Registry (*.docker.pkg.dev). gcr.io/PROJECT/image needs legacy GCR + extra IAM.
    - case "$DEST" in *docker.pkg.dev/*) ;; *) echo "ERROR: deploy-image.txt must use Artifact Registry (e.g. us-central1-docker.pkg.dev/PROJECT/REPO/IMAGE:TAG), not gcr.io. Ensure gcp-plan runs node scripts/ci-write-deploy-image.js from the latest main."; echo "Got: $DEST"; exit 1;; esac
    - /kaniko/executor --context "$CI_PROJECT_DIR" --dockerfile Dockerfile --destination "$DEST" --verbosity=info
  only:
    - main
    - master

deploy-cloud-run:
  stage: deploy
  image: google/cloud-sdk:alpine
  needs:
    - job: gcp-plan
      artifacts: true
    - job: build-container
  script:
    - apk add jq
    - echo "$GCP_SERVICE_ACCOUNT_KEY" | base64 -d > key.json
    - gcloud auth activate-service-account --key-file=key.json
    - gcloud config set project "$GCP_PROJECT_ID"
    - SERVICE_NAME=$(jq -r '.deploymentConfig.cloudRun.serviceName' gcp-plan.json)
    - IMAGE=$(cat deploy-image.txt)
    - gcloud run deploy "$SERVICE_NAME" --image="$IMAGE" --region="$GCP_REGION" --platform=managed --allow-unauthenticated --project="$GCP_PROJECT_ID"
  only:
    - main
    - master
