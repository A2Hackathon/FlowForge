stages:
  - plan
  - deploy

gcp-plan:
  stage: plan
  image: node:20
  before_script:
    - npm ci --omit=dev
  script:
    - node src/agent/cli.js "$CI_PROJECT_ID"
  variables:
    # Required because gitlabClient uses Authorization: Bearer <token>
    GITLAB_TOKEN: $GITLAB_TOKEN
    GITLAB_PROJECT_ID: $CI_PROJECT_ID
  artifacts:
    paths:
      - gcp-plan.json
    expire_in: 1 day

deploy-from-plan:
  stage: deploy
  image: google/cloud-sdk:alpine
  script:
    - apk add jq

    - echo "$GCP_SERVICE_ACCOUNT_KEY" | base64 -d > key.json
    - gcloud auth activate-service-account --key-file=key.json
    - gcloud config set project $GCP_PROJECT_ID

    - SERVICE_NAME=$(jq -r '.deploymentConfig.serviceName' gcp-plan.json)
    - IMAGE="gcr.io/$GCP_PROJECT_ID/$SERVICE_NAME:$CI_COMMIT_SHA"

    - gcloud builds submit --tag $IMAGE .

    - gcloud run deploy $SERVICE_NAME \
        --image=$IMAGE \
        --region=us-central1 \
        --platform=managed \
        --allow-unauthenticated
  only:
    - main
    - master

    