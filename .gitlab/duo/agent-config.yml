# FlowForge Duo flow execution: index + retrieve (grounded context), then GCP plan CLI; agent summarizes with citations.
# When the flow is triggered (mention/assign), this runs in the workload job.

image: node:20-alpine

setup_script:
  - apk add --no-cache git
  - npm ci
  - cd tools/retriever && npm ci && cd ../..
  # Retriever: index repo (entities + edges), then retrieve snippets for the user question (GOAL or fallback).
  - node tools/retriever/index.js index --repo . --out retrieval
  - node tools/retriever/index.js retrieve --repo . --index retrieval/index.json --query "${GOAL:-Summarize this repo and how auth and deployment work}" --out retrieval
  # GITLAB_TOKEN and CI_PROJECT_ID are provided by the Duo workload pipeline.
  - node src/agent/cli.js "${CI_PROJECT_ID}" --write-files
  # Trigger the project CI pipeline (plan → deploy to GCP) after the plan is written — same as a push to main.
  # Runs by default. Opt out: CI/CD variable FLOWFORGE_SKIP_PIPELINE_TRIGGER=1
  # Auth: FLOWFORGE_GITLAB_TRIGGER_TOKEN (glptt) or FLOWFORGE_GITLAB_API_TOKEN (glpat). Do not use GITLAB_TOKEN for PAT in Duo — Duo overrides it.
  - |
    echo "=== FlowForge: post-CLI pipeline trigger ==="
    if [ "${FLOWFORGE_SKIP_PIPELINE_TRIGGER:-}" = "1" ] || [ "${FLOWFORGE_SKIP_PIPELINE_TRIGGER:-}" = "true" ]; then
      echo "FLOWFORGE_SKIP_PIPELINE_TRIGGER is set — not triggering a pipeline."
    else
      REF="${FLOWFORGE_DEPLOY_REF:-${CI_DEFAULT_BRANCH:-main}}"
      echo "Triggering GitLab pipeline on ref: $REF (project ${CI_PROJECT_ID})"
      node scripts/trigger-pipeline.js "${CI_PROJECT_ID}" "$REF"
    fi

cache:
  paths:
    - node_modules/
    - tools/retriever/node_modules/
  key:
    files:
      - package-lock.json
      - tools/retriever/package.json
    prefix: flowforge
