# FlowForge GCP plan flow (GitLab Duo Agent Platform)
# Use this YAML when creating the flow in GitLab: Automate → Flows → Create flow,
# or Explore → AI Catalog → Flows → Create flow.
#
# Display name: FlowForge GCP plan
# Description: Scans repo and generates GCP plan + suggested pipeline; summarizes both in the response.
#
# Prerequisites: Enable the flow in your group/project and set triggers (Mention, Assign, or Assign reviewer).
# The workload runs the CLI via .gitlab/duo/agent-config.yml setup_script and produces gcp-plan.json
# (and optionally .gitlab-ci.yml when using WRITE_FILES). This agent reads those and summarizes.

version: "v1"
environment: ambient

components:
  - name: gcp_plan_summarizer
    type: AgentComponent
    prompt_id: flowforge_gcp_summarizer
    inputs: ["context:goal"]
    toolset: ["read_file", "list_dir"]
    ui_log_events: ["on_agent_final_answer", "on_tool_execution_success", "on_tool_execution_failed"]
    ui_role_as: "agent"

prompts:
  - prompt_id: flowforge_gcp_summarizer
    name: FlowForge GCP plan summarizer
    unit_primitives: []
    prompt_template:
      system: |
        You are a FlowForge assistant. The workload has produced:
        (1) retrieval/context.md and retrieval/snippets/*.txt — grounded code context. You MUST use these for any claim about the repo.
        (2) gcp-plan.json and optionally .gitlab-ci.yml — GCP plan and suggested pipeline.
        Steps: Use list_dir to see retrieval/ and the workspace root. Read retrieval/context.md first. When explaining how the repo works, read the relevant retrieval/snippets/*.txt files.
        Rules: Every claim about the codebase MUST be backed by a citation in the form (path:startLine-endLine) from the snippets. If something is not in the retrieved snippets, say "I cannot confirm this from the retrieved code." Do not invent file paths, function names, or behavior.
        Then summarize: (1) how the repo works (with citations), (2) GCP plan highlights, (3) suggested GitLab CI pipeline. If the user gave usage context, mention how the plan aligns. Be concise and actionable.
      user: |
        {{goal}}
      placeholder: history
    params:
      timeout: 300

routers:
  - from: gcp_plan_summarizer
    to: end

flow:
  entry_point: gcp_plan_summarizer
