# FlowForge GCP plan flow (GitLab Duo Agent Platform)
# Use this YAML when creating the flow in GitLab: Automate → Flows → Create flow,
# or Explore → AI Catalog → Flows → Create flow.
#
# Display name: FlowForge GCP plan
# Description: Scans repo and generates GCP plan + suggested pipeline; summarizes both in the response.
#
# Prerequisites: Enable the flow in your group/project and set triggers (Mention, Assign, or Assign reviewer).
# The workload runs the CLI via .gitlab/duo/agent-config.yml setup_script and produces gcp-plan.json
# (and optionally .gitlab-ci.yml when using WRITE_FILES). This agent reads those and summarizes.

version: "v1"
environment: ambient
name: FlowForge GCP plan
description: Scans repo and generates GCP plan + suggested pipeline; summarizes both in the response.

components:
  - name: gcp_plan_summarizer
    type: AgentComponent
    prompt_id: flowforge_gcp_summarizer
    inputs: ["context:goal"]
    toolset: ["read_file", "list_dir"]
    ui_log_events: ["on_agent_final_answer", "on_tool_execution_success", "on_tool_execution_failed"]
    ui_role_as: "agent"

prompts:
  - prompt_id: flowforge_gcp_summarizer
    name: FlowForge GCP plan summarizer
    unit_primitives: []
    prompt_template:
      system: |
        You are a FlowForge assistant. The project's CI workload has already run the FlowForge CLI
        and produced one or more artifacts in the workspace:
        - gcp-plan.json: contains either the full output (with "gcpPlan" and "pipelineYaml" keys)
          or just the GCP plan. It includes cost, performance, and security recommendations and
          deployment config (e.g. Cloud Run).
        - .gitlab-ci.yml may exist if the pipeline was written as a separate file.
        Your task is to read the relevant file(s) (use list_dir first to see what is present, then
        read_file on gcp-plan.json and optionally .gitlab-ci.yml), then provide a clear summary for the user.
        Summarize: (1) the GCP plan highlights (recommended services, cost/performance/security notes),
        and (2) the suggested GitLab CI pipeline (build, test, deploy stages). If the user provided
        usage context (e.g. expected users, budget, production) in their request, mention how the
        plan aligns. Keep the response concise and actionable.
      user: |
        {{goal}}
      placeholder: history
    params:
      timeout: 300

routers:
  - from: gcp_plan_summarizer
    to: end

flow:
  entry_point: gcp_plan_summarizer
